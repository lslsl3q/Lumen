<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen Chrome Bridge</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 280px;
      padding: 14px;
      font-family: system-ui, sans-serif;
      font-size: 13px;
      background: #1a1a2e;
      color: #e0e0e0;
    }
    h1 {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
      color: #fff;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      padding: 8px 10px;
      border-radius: 6px;
      background: #222240;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.on { background: #22c55e; box-shadow: 0 0 6px #22c55e; }
    .dot.off { background: #ef4444; }
    .status-text { font-size: 12px; }
    .config { margin-bottom: 12px; }
    label {
      display: block;
      font-size: 11px;
      color: #888;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 6px 8px;
      border: 1px solid #333;
      border-radius: 4px;
      background: #111122;
      color: #e0e0e0;
      font-size: 12px;
      outline: none;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%;
      padding: 7px 12px;
      border: none;
      border-radius: 4px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-connect {
      background: #6366f1;
      color: #fff;
      margin-bottom: 6px;
    }
    .btn-connect:hover { background: #5558e6; }
    .btn-reconnect {
      background: #333355;
      color: #ccc;
    }
    .btn-reconnect:hover { background: #444466; }
    .info {
      margin-top: 10px;
      font-size: 10px;
      color: #666;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <h1>Lumen Chrome Bridge</h1>

  <div class="status-row" id="statusRow">
    <div class="dot off" id="dot"></div>
    <span class="status-text" id="statusText">检查中…</span>
  </div>

  <div class="config">
    <label for="wsUrl">Lumen WebSocket 地址</label>
    <input type="text" id="wsUrl" value="ws://127.0.0.1:8888/ws" />
  </div>

  <button class="btn-connect" id="btnSave">保存并重连</button>
  <button class="btn-reconnect" id="btnReconnect">强制重连</button>

  <div class="info">
    确保 Lumen 后端已启动。<br>
    连接成功后在 Lumen 中可让 AI 浏览网页。
  </div>

  <script src="popup.js"></script>
</body>
</html>
